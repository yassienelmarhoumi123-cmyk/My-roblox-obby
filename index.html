<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Battle Obby</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        .ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; display: flex; }
        .player-ui { flex: 1; padding: 15px; color: white; text-shadow: 2px 2px 4px #000; font-size: 14px; z-index: 10; }
        .controls-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .btn-group { display: flex; gap: 4px; pointer-events: auto; }
        .btn { width: 48px; height: 48px; background: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; -webkit-user-select: none; }
        #divider { position: absolute; left: 50%; width: 2px; height: 100%; background: white; z-index: 50; transform: translateX(-50%); }
        #win-msg { position: absolute; top: 50%; width: 100%; text-align: center; color: gold; font-size: 50px; font-weight: bold; text-shadow: 4px 4px #000; display: none; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>
    <div id="win-msg">SPIELER GEWINNT!</div>
    <div id="divider"></div>
    <div class="ui-container">
        <div class="player-ui">P1 (Blau): <span id="s1">0</span>/100<br>W,A,S,D | F = SCHLAGEN</div>
        <div class="player-ui" style="text-align: right;">P2 (Rot): <span id="s2">0</span>/100<br>Pfeile | # = SCHLAGEN</div>
    </div>

    <div class="controls-container">
        <div class="btn-group">
            <div id="p1L" class="btn">A</div>
            <div id="p1F" class="btn" style="background:white;color:black">W</div>
            <div id="p1R" class="btn">D</div>
            <div id="p1Hit" class="btn" style="background:red">HIT</div>
            <div id="p1J" class="btn" style="background:green">JMP</div>
        </div>
        <div class="btn-group">
            <div id="p2L" class="btn">←</div>
            <div id="p2F" class="btn" style="background:white;color:black">↑</div>
            <div id="p2R" class="btn">→</div>
            <div id="p2Hit" class="btn" style="background:red">HIT</div>
            <div id="p2J" class="btn" style="background:green">JMP</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.autoClear = false;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        const cam1 = new THREE.PerspectiveCamera(75, (window.innerWidth/2)/window.innerHeight, 0.1, 1000);
        const cam2 = new THREE.PerspectiveCamera(75, (window.innerWidth/2)/window.innerHeight, 0.1, 1000);

        class Player {
            constructor(id, color, startX) {
                this.id = id;
                this.group = new THREE.Group();
                this.body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: color }));
                this.group.add(this.body);
                
                // Schläger hinzufügen
                this.bat = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 0.3), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                this.bat.position.set(0.7, 0, 0.5);
                this.group.add(this.bat);
                
                scene.add(this.group);
                this.x = startX; this.y = 5; this.z = 12;
                this.vy = 0; this.yaw = 0; this.score = 0;
                this.keys = {}; this.knockback = {x:0, z:0};
                this.hitCooldown = 0;
            }
        }
        const p1 = new Player(1, 0x0000ff, -3); 
        const p2 = new Player(2, 0xff0000, 3);

        const platforms = [];
        const colors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x9400d3];
        for(let i=0; i<=100; i++) {
            let w = (i===0) ? 25 : 8;
            const b = new THREE.Mesh(
                new THREE.BoxGeometry(w, 1.2, (i===0)?25:8),
                new THREE.MeshStandardMaterial({ color: (i===0)?0xcccccc : (i===100?0xffd700 : colors[i % colors.length]) })
            );
            if(i > 0) {
                let a = i * 0.45;
                b.position.set(Math.sin(a)*12, i*2.2, Math.cos(a)*12);
            } else b.position.set(0, 0, 0);
            b.userData = { w: w/2, d: (i===0)?12.5:4, y: b.position.y, id: i };
            scene.add(b); platforms.push(b);
        }

        window.onkeydown = (e) => {
            if(e.code === 'KeyW') p1.keys.f = true; if(e.code === 'KeyS') p1.keys.b = true;
            if(e.code === 'KeyA') p1.keys.l = true; if(e.code === 'KeyD') p1.keys.r = true;
            if(e.code === 'KeyQ') p1.keys.rl = true; if(e.code === 'KeyE') p1.keys.rr = true;
            if(e.code === 'Space') p1.keys.j = true; if(e.code === 'KeyF') p1.keys.hit = true;

            if(e.code === 'ArrowUp') p2.keys.f = true; if(e.code === 'ArrowDown') p2.keys.b = true;
            if(e.code === 'ArrowLeft') p2.keys.l = true; if(e.code === 'ArrowRight') p2.keys.r = true;
            if(e.code === 'Comma') p2.keys.rl = true; if(e.code === 'Period') p2.keys.rr = true;
            if(e.code === 'Enter') p2.keys.j = true; if(e.code === 'Digit0' || e.code === 'Backslash') p2.keys.hit = true;
        };
        window.onkeyup = (e) => {
            if(e.code === 'KeyW') p1.keys.f = false; if(e.code === 'KeyS') p1.keys.b = false;
            if(e.code === 'KeyA') p1.keys.l = false; if(e.code === 'KeyD') p1.keys.r = false;
            if(e.code === 'KeyQ') p1.keys.rl = false; if(e.code === 'KeyE') p1.keys.rr = false;
            if(e.code === 'Space') p1.keys.j = false; if(e.code === 'KeyF') p1.keys.hit = false;
            if(e.code === 'ArrowUp') p2.keys.f = false; if(e.code === 'ArrowDown') p2.keys.b = false;
            if(e.code === 'ArrowLeft') p2.keys.l = false; if(e.code === 'ArrowRight') p2.keys.r = false;
            if(e.code === 'Comma') p2.keys.rl = false; if(e.code === 'Period') p2.keys.rr = false;
            if(e.code === 'Enter') p2.keys.j = false; if(e.code === 'Digit0' || e.code === 'Backslash') p2.keys.hit = false;
        };

        const setupBtn = (id, p, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); p.keys[k] = true; };
            el.ontouchend = (e) => { e.preventDefault(); p.keys[k] = false; };
        };
        setupBtn('p1F', p1, 'f'); setupBtn('p1L', p1, 'l'); setupBtn('p1R', p1, 'r'); setupBtn('p1J', p1, 'j'); setupBtn('p1Hit', p1, 'hit');
        setupBtn('p2F', p2, 'f'); setupBtn('p2L', p2, 'l'); setupBtn('p2R', p2, 'r'); setupBtn('p2J', p2, 'j'); setupBtn('p2Hit', p2, 'hit');

        function checkHit(attacker, victim) {
            if(attacker.keys.hit && attacker.hitCooldown <= 0) {
                let dist = Math.sqrt((attacker.x - victim.x)**2 + (attacker.z - victim.z)**2);
                if(dist < 3 && Math.abs(attacker.y - victim.y) < 2) {
                    let angle = Math.atan2(victim.x - attacker.x, victim.z - attacker.z);
                    victim.knockback.x = Math.sin(angle) * 0.8;
                    victim.knockback.z = Math.cos(angle) * 0.8;
                    attacker.hitCooldown = 30; // Cooldown
                }
            }
        }

        function update(p, cam, other) {
            p.vy -= 0.012; p.y += p.vy;
            if(p.keys.rl) p.yaw += 0.05; if(p.keys.rr) p.yaw -= 0.05;
            if(p.hitCooldown > 0) p.hitCooldown--;

            let speed = 0.2;
            let moveX = p.knockback.x, moveZ = p.knockback.z;
            p.knockback.x *= 0.9; p.knockback.z *= 0.9;

            if(p.keys.f) { moveX += Math.sin(p.yaw) * speed; moveZ += Math.cos(p.yaw) * speed; }
            if(p.keys.b) { moveX -= Math.sin(p.yaw) * speed; moveZ -= Math.cos(p.yaw) * speed; }
            if(p.keys.l) { moveX += Math.cos(p.yaw) * speed; moveZ -= Math.sin(p.yaw) * speed; }
            if(p.keys.r) { moveX -= Math.cos(p.yaw) * speed; moveZ += Math.sin(p.yaw) * speed; }
            p.x += moveX; p.z += moveZ;

            let onG = false;
            platforms.forEach(pl => {
                if(Math.abs(p.x - pl.position.x) < pl.userData.w + 0.4 && Math.abs(p.z - pl.position.z) < pl.userData.d + 0.4) {
                    let ground = pl.userData.y + 0.6;
                    if(p.y <= ground + 1.8 && p.y > ground - 0.5) {
                        p.y = ground + 1.8; p.vy = 0; onG = true;
                        p.score = Math.max(p.score, pl.userData.id);
                        document.getElementById('s'+p.id).innerText = p.score;
                        if(p.score === 100) {
                            document.getElementById('win-msg').style.display = 'block';
                            document.getElementById('win-msg').innerText = "SPIELER " + p.id + " GEWINNT!";
                        }
                    }
                }
            });
            if(onG && p.keys.j) p.vy = 0.35;
            if(p.y < -30) { p.y = 5; p.z = 12; p.x = (p.id===1)?-3:3; p.vy = 0; }
            
            p.group.position.set(p.x, p.y - 1, p.z);
            p.group.rotation.y = p.yaw;
            
            // Schläger Animation
            if(p.keys.hit) p.bat.rotation.x = -1; else p.bat.rotation.x = 0;

            cam.position.set(p.x - Math.sin(p.yaw)*8, p.y + 4, p.z - Math.cos(p.yaw)*8);
            cam.lookAt(p.x, p.y, p.z);
            checkHit(p, other);
        }

        function loop() {
            update(p1, cam1, p2); update(p2, cam2, p1);
            let w = window.innerWidth, h = window.innerHeight;
            renderer.setViewport(0, 0, w/2, h); renderer.setScissor(0, 0, w/2, h);
            renderer.setScissorTest(true); renderer.render(scene, cam1);
            renderer.setViewport(w/2, 0, w/2, h); renderer.setScissor(w/2, 0, w/2, h);
            renderer.setScissorTest(true); renderer.render(scene, cam2);
            requestAnimationFrame(loop);
        }
        loop();
        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            cam1.aspect = cam2.aspect = (window.innerWidth/2)/window.innerHeight;
            cam1.updateProjectionMatrix(); cam2.updateProjectionMatrix();
        };
    </script>
</body>
</html>
