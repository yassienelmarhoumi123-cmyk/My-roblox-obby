<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - First Person Easy</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; }
        .noise { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; opacity: 0.08; pointer-events: none; background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_v2.png'); }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 25px; pointer-events: auto; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div id="crosshair"></div>
    <div id="ui"><h2>FIRST PERSON - EASY MODE</h2></div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div id="btnLeft" class="btn">◀</div>
            <div id="btnRight" class="btn">▶</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x22aaff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // WELT MIT NÄHEREN PLATTFORMEN
        const platforms = [];
        function block(x, y, z, w, d, c) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: c }));
            b.position.set(x, y, z);
            scene.add(b);
            b.userData = { w, d };
            platforms.push(b);
        }

        // Abstände von 8 auf 5-6 Einheiten verkürzt
        block(0, -0.3, 0, 8, 8, 0x333333);    // Start
        block(0, 0.5, -6, 4, 4, 0x00ff88);   // Näher dran
        block(1, 1.2, -12, 4, 4, 0x00ccff);  // Näher dran
        block(-1, 2.0, -18, 4, 4, 0xff0088); // Näher dran
        block(0, 2.8, -25, 8, 8, 0xffdd00);  // Ziel

        let px = 0, py = 2, pz = 0, vy = 0;
        let moveX = 0; 
        let onGround = false;

        document.getElementById('btnLeft').ontouchstart = () => moveX = -0.15;
        document.getElementById('btnRight').ontouchstart = () => moveX = 0.15;
        document.getElementById('btnLeft').ontouchend = document.getElementById('btnRight').ontouchend = () => moveX = 0;
        
        // SPRUNGKRAFT ERHÖHT (von 0.18 auf 0.22)
        document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.22; };

        function loop() {
            px += moveX;
            pz -= 0.07; // Etwas schnelleres Vorankommen
            vy -= 0.008;
            py += vy;

            onGround = false;
            platforms.forEach(p => {
