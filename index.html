<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roblox Back to Basics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #66ccff; font-family: sans-serif; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body>
    <div class="controls">
        <div id="left" class="btn">◀</div>
        <div id="right" class="btn">▶</div>
        <div id="jump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x66ccff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // DER ALTE EINFACHE AVATAR (Ein Block)
        const player = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshStandardMaterial({ color: 0xffffff })
        );
        player.position.y = 0.5;
        scene.add(player);

        // BODEN
        const floor = new THREE.Mesh(
            new THREE.BoxGeometry(100, 0.5, 10),
            new THREE.MeshStandardMaterial({ color: 0x22cc22 })
        );
        floor.position.y = -0.25;
        scene.add(floor);

        camera.position.set(0, 3, 7);
        camera.lookAt(0, 0, 0);

        let moveX = 0, vy = 0, onGround = true;

        document.getElementById('left').ontouchstart = () => moveX = -0.15;
        document.getElementById('right').ontouchstart = () => moveX = 0.15;
