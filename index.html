<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Obby</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; text-shadow: 2px 2px 4px #000; font-size: 24px; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 100; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; -webkit-user-select: none; }
    </style>
</head>
<body>
    <div id="ui">Höhe: <span id="score">0</span></div>
    <div class="controls">
        <div id="btnL" class="btn">L</div>
        <div id="btnF" class="btn" style="background: white; color: black;">VOR</div>
        <div id="btnR" class="btn">R</div>
        <div id="btnJ" class="btn" style="background: #00ff00; color: black;">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        let px = 0, py = 15, pz = 25, vy = 0, yaw = 0, moveX = 0, moveZ = 0, onGround = false, score = 0;
        const platforms = [];

        function createPlatform(id) {
            let w = id === 0 ? 30 : 8, d = id === 0 ? 30 : 8;
            const colors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x9400d3];
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 1.5, d), new THREE.MeshStandardMaterial({ color: id === 0 ? 0xcccccc : colors[id % colors.length] }));
            let x = 0, y = 0, z = 0;
            if (id > 0) { x = Math.sin(id * 0.4) * 12; z = id * -15; y = id * 2.5; }
            mesh.position.set(x, y, z);
            mesh.userData = { w: w/2, d: d/2, id: id };
            scene.add(mesh);
            platforms.push(mesh);
        }
        for (let i = 0; i < 40; i++) createPlatform(i);

        const b = (id, act) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); act(true); };
            el.ontouchend = (e) => { e.preventDefault(); act(false); };
        };
        b('btnL', v => moveX = v ? -0.2 : 0);
        b('btnR', v => moveX = v ? 0.2 : 0);
        b('btnF', v => moveZ = v ? -0.2 : 0);
        document.getElementById('btnJ').ontouchstart = (e) => { e.preventDefault(); if(onGround) vy = 0.4; };

        function loop() {
            vy -= 0.02; py += vy;
            px += Math.sin(yaw) * moveZ + Math.cos(yaw) * moveX;
            pz += Math.cos(yaw) * moveZ - Math.sin(yaw) * moveX;
            onGround = false;
            platforms.forEach(p => {
                if (Math.abs(px - p.position.x) < p.userData.w + 0.4 && Math.abs(pz - p.position.z) < p.userData.d + 0.4) {
                    let top = p.position.y + 0.75;
                    if (py <= top + 1.8 && py > top - 0.5 && vy <= 0) { py = top + 1.8; vy = 0; onGround = true; score = Math.max(score, p.userData.id); document.getElementById('score').innerText = score; }
                }
            });
            if (py < -30) { px = 0; py = 15; pz = 25; vy = 0; }
            camera.position.set(px, py + 8, pz + 15);
            camera.lookAt(px, py, pz - 10);
            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
