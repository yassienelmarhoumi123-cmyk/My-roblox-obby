<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #70c5ce; font-family: sans-serif; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: #70c5ce; }
        #score { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 48px; font-weight: bold; text-shadow: 2px 2px 5px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Bildschirmgröße anpassen
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Spiel-Variablen
        let bird = { x: 50, y: canvas.height / 2, w: 34, h: 24, velocity: 0, gravity: 0.25, jump: -6 };
        let pipes = [];
        let pipeWidth = 60;
        let pipeGap = 160;
        let frame = 0;
        let score = 0;
        let gameActive = true;

        function createPipe() {
            let height = Math.random() * (canvas.height - pipeGap - 100) + 50;
            pipes.push({ x: canvas.width, top: height, bottom: canvas.height - height - pipeGap, passed: false });
        }

        function draw() {
            // Hintergrund löschen
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vogel zeichnen (Gelber Block/Kreis)
            ctx.fillStyle = "#f8e71c";
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "black";
            ctx.stroke();

            // Röhren zeichnen
            ctx.fillStyle = "#75c928";
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, pipeWidth, p.top); // Oben
                ctx.strokeRect(p.x, 0, pipeWidth, p.top);
                ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom); // Unten
                ctx.strokeRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
            });

            if (gameActive) {
                // Physik
                bird.velocity += bird.gravity;
                bird.y += bird.velocity;

                // Röhren bewegen
                if (frame % 90 === 0) createPipe();
                pipes.forEach((p, index) => {
                    p.x -= 3;

                    // Kollision
                    if (bird.x + 15 > p.x && bird.x - 15 < p.x + pipeWidth) {
                        if (bird.y - 15 < p.top || bird.y + 15 > canvas.height - p.bottom) {
                            gameActive = false;
                        }
                    }

                    // Score zählen
                    if (!p.passed && p.x + pipeWidth < bird.x) {
                        score++;
                        p.passed = true;
                        scoreElement.innerText = score;
                    }

                    // Röhren löschen wenn aus dem Bild
                    if (p.x + pipeWidth < 0) pipes.splice(index, 1);
                });

                // Boden/Decke Kollision
                if (bird.y + 15 > canvas.height || bird.y - 15 < 0) gameActive = false;
            } else {
                // Game Over Text
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.
