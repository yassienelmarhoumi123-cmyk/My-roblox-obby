<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; font-family: sans-serif; touch-action: none; }
        .noise { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; opacity: 0.08; pointer-events: none; background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_v2.png'); }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 75px; height: 75px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; pointer-events: auto; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div id="crosshair"></div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div id="btnLeft" class="btn">L</div>
            <div id="btnRight" class="btn">R</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x22aaff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        const platforms = [];
        function block(x, y, z, w, d, c) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: c }));
            b.position.set(x, y, z);
            scene.add(b);
            b.userData = { w, d };
            platforms.push(b);
        }

        // LEVEL - EXTREM NAH ZUSAMMEN
        block(0, 0, 0, 8, 8, 0x444444);      // Start
        block(0, 0.5, -5, 4, 4, 0x00ff88);   // Block 1 (Grün)
        block(0, 1.0, -9, 4, 4, 0x00ccff);   // Block 2 (Türkis) - SEHR NAH
        block(1, 1.5, -14, 4, 4, 0xff0088); 
        block(-1, 2.0, -19, 4, 4, 0x00ff88);
        block(0, 2.5, -25, 12, 12, 0xffdd00); // Ziel

        let px = 0, py = 2, pz = 0, vy = 0;
        let moveX = 0;
        let yaw = 0, pitch = 0;
        let onGround = false;

        // TOUCH LOOK FIX
        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].pageX;
            touchStartY = e.touches[0].pageY;
        });
        window.addEventListener('touchmove', e => {
            let dx = e.touches[0].pageX - touchStartX;
            let dy = e.touches[0].pageY - touchStartY;
            yaw -= dx * 0.005;
            pitch -= dy * 0.005;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
            touchStartX = e.touches[0].pageX;
            touchStartY = e.touches[0].pageY;
        });

        // INPUTS
        window.addEventListener('keydown', e => {
            if(e.code === 'Space' && onGround) vy = 0.25;
            if(e.code === 'KeyA') moveX = -0.15;
            if(e.code === 'KeyD') moveX = 0.15;
        });
        window.addEventListener('keyup', e => { if(e.code === 'KeyA' || e.code === 'KeyD') moveX = 0; });

        document.getElementById('btnLeft').ontouchstart = () => moveX = -0.15;
        document.getElementById('btnRight').ontouchstart = () => moveX = 0.15;
        document.getElementById('btnLeft').ontouchend = document.getElementById('btnRight').ontouchend = () => moveX = 0;
        document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.25; };

        function loop() {
            vy -= 0.01;
            py += vy;

            // Bewegung relativ zum Blick
            px += Math.cos(yaw) * moveX;
            pz += Math.sin(yaw) * moveX;
            
            // Vorwärtsdrang
            pz -= Math.cos(yaw) * 0.07;
            px -= Math.sin(yaw) * 0.07;

            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(px - p.position.x);
                let dz = Math.abs(pz - p.position.z);
                if(dx < p.userData.w/2 + 0.3 && dz < p.userData.d/2 + 0.3) {
                    let top = p.position.y + 0.25;
                    if(py <= top + 1.5 && py > top) {
                        py = top + 1.5; vy = 0; onGround = true;
                    }
                }
            });

            if(py < -15) { px = 0; py = 3; pz = 0; vy = 0; yaw = 0; pitch = 0; }

            camera.position.set(px, py, pz);
            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        loop();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
