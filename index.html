<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - Infinite Highscore</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        .noise { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; opacity: 0.1; pointer-events: none; background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_v2.png'); }
        
        /* UI FÜR SCORE */
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #scoreBox { font-size: 24px; font-weight: bold; color: #00ff88; }
        #highBox { font-size: 16px; color: #ffffff; opacity: 0.8; }

        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 85px; height: 85px; background: rgba(0,0,0,0.7); border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; pointer-events: auto; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 2px solid #ffffff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div id="crosshair"></div>
    
    <div id="ui">
        <div id="scoreBox">Score: 0</div>
        <div id="highBox">Best: 0</div>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div id="btnLeft" class="btn">L</div>
            <div id="btnRight" class="btn">R</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1188ff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.7);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // SPIELER & SCORE WERTE
        let px = 0, py = 2, pz = 0, vy = 0;
        let moveX = 0, yaw = 0, pitch = 0, onGround = false;
        let score = 0;
        let highscore = localStorage.getItem('obbyHighscore') || 0;
        document.getElementById('highBox').innerText = "Best: " + highscore;

        // UNENDLICHE GENERIERUNG
        const platforms = [];
        let lastZ = 0;
        let lastX = 0;
        let platformHeight = 0;
        const colors = [0x00ff88, 0x00ccff, 0xff0088, 0xffdd00, 0xffffff];

        function createPlatform(isStart = false) {
            let w = isStart ? 10 : 6;
            let d = isStart ? 10 : 6;
            let color = isStart ? 0x333333 : colors[Math.floor(Math.random() * colors.length)];
            
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: color }));
            
            if (!isStart) {
                lastZ -= (8 + Math.random() * 2); // Distanz ca. 8-10
                lastX += (Math.random() - 0.5) * 6; // Leichte Kurven
                platformHeight += 0.8;
            }
            
            b.position.set(lastX, platformHeight, lastZ);
            scene.add(b);
            b.userData = { w, d, id: platforms.length };
            platforms.push(b);
        }

        // Start-Setup: 10 Plattformen vorausbauen
        for(let i=0; i<15; i++) { createPlatform(i === 0); }

        // TOUCH LOOK
        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', e => { touchStartX = e.touches[0].pageX; touchStartY = e.touches[0].pageY; });
        window.addEventListener('touchmove', e => {
            let dx = e.touches[0].pageX - touchStartX;
            let dy = e.touches[0].pageY - touchStartY;
            yaw -= dx * 0.006; pitch -= dy * 0.006;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
            touchStartX = e.touches[0].pageX; touchStartY = e.touches[0].pageY;
        });

        // INPUTS
        window.addEventListener('keydown', e => {
            if(e.code === 'Space' && onGround) vy = 0.26; 
            if(e.code === 'KeyA') moveX = -0.15;
            if(e.code === 'KeyD') moveX = 0.15;
        });
        window.addEventListener('keyup', e => { if(e.code === 'KeyA' || e.code === 'KeyD') moveX = 0; });

        document.getElementById('btnLeft').ontouchstart = () => moveX = -0.15;
        document.getElementById('btnRight').ontouchstart = () => moveX = 0.15;
        document.getElementById('btnLeft').ontouchend = document.getElementById('btnRight').ontouchend = () => moveX = 0;
        document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.26; };

        function resetGame() {
            if(score > highscore) {
                highscore = score;
                localStorage.setItem('obbyHighscore', highscore);
                document.getElementById('highBox').innerText = "Best: " + highscore;
            }
            px = 0; py = 3; pz = 0; vy = 0; yaw = 0; pitch = 0; score = 0;
            document.getElementById('scoreBox').innerText = "Score: 0";
        }

        function loop() {
            vy -= 0.01; py += vy;
            px += Math.cos(yaw) * moveX; pz += Math.sin(yaw) * moveX;
            pz -= Math.cos(yaw) * 0.09; px -= Math.sin(yaw) * 0.09; 

            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(px - p.position.x);
                let dz = Math.abs(pz - p.position.z);
                if(dx < p.userData.w/2 + 0.3 && dz < p.userData.d/2 + 0.3) {
                    let top = p.position.y + 0.25;
                    if(py <= top + 1.5 && py > top) { 
                        py = top + 1.5; vy = 0;
