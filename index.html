<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - Photo Style</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; }
        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 5; opacity: 0.06; pointer-events: none;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_v2.png');
        }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 25px; pointer-events: auto; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div id="ui"><h2>BACON OBBY</h2><p>Nach Vorlage deiner Fotos gebaut</p></div>
    <div class="controls">
        <div style="display: flex; gap: 15px;"><div id="bL" class="btn">◀</div><div id="bR" class="btn">▶</div></div>
        <div id="bJ" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x444444);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Licht wie im 3D-Programm auf deinen Bildern
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // --- CHARAKTER BAUEN NACH DEINEN FOTOS ---
        const player = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.5 }); // Das Grau aus deinen Bildern

        function createPart(w, h, d, x, y, z) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            return mesh;
        }

        // Torso (IMG_2518)
        const torso = createPart(0.8, 1.0, 0.4, 0, 0.5, 0);
        player.add(torso);

        // Kopf (Etwas runder wie in IMG_2520)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16), mat);
        head.scale.y = 1.1; head.position.y = 1.3;
        player.add(head);

        // Arme (IMG_2515)
        const lArm = createPart(0.35, 0.9, 0.35, -0.65, 0.55, 0);
        const rArm = createPart(0.35, 0.9, 0.35, 0.65, 0.55, 0);
        player.add(lArm, rArm);

        // Beine (IMG_2516)
        const lLeg = createPart(0.38, 1.0, 0.38, -0.22, -0.45, 0);
        const rLeg = createPart(0.38, 1.0, 0.38, 0.22, -0.45, 0);
        player.add(lLeg, rLeg);

        scene.add(player);

        // --- WELT ---
        const platforms = [];
        function addB(x,y,z,w,d) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w,0.5,d), new THREE.MeshStandardMaterial({color:0x22ffaa}));
            b.position.set(x,y,z); scene.add(b); b.userData={w,d}; platforms.push(b);
        }
        addB(0,-1,0,5,5); addB(0,-0.5,-6,3,3); addB(2,0,-11,2,2); addB(0,0.5,-16,4,4);

        // LOGIK
        let px=0, py=2, pz=0, vy=0, onG=false;
        let keys = {a:false, d:false, w:false, s:false};

        window.onkeydown=(e)=>{
            if(e.code==='KeyA')keys.a=true; if(e.code==='KeyD')keys.d=true;
            if(e.code==='KeyW')keys.w=true; if(e.code==='KeyS')keys.s=true;
            if(e.code==='Space'&&onG)vy=0.18;
        };
        window.onkeyup=(e)=>{
            if(e.code==='KeyA')keys.a=false; if(e.code==='KeyD')keys.d=false;
            if(e.code==='KeyW')keys.w=false; if(e.code==='KeyS')keys.s=false;
        };

        document.getElementById('bL').ontouchstart=()=>keys.a=true;
        document.getElementById('bL').ontouchend=()=>keys.a=false;
        document.getElementById('bR').ontouchstart=()=>keys.d=true;
        document.getElementById('bR').ontouchend=()=>keys.d=false;
        document.getElementById('bJ').ontouchstart=()=>{if(onG)vy=0.18;};

        function loop() {
            if(keys.a)px-=0.1; if(keys.d)px+=0.1; if(keys.w)pz-=0.1; if(keys.s)pz+=0.1;
            vy-=0.009; py+=vy; onG=false;
            platforms.forEach(p=>{
                let dx=Math.abs(px-p.position.x), dz=Math.abs(pz-p.position.z);
                if(dx<p.userData.w/2+0.3 && dz<p.userData.d/2+0.3) {
                    let top = p.position.y+0.25;
                    if(py<=top && py>top-0.5 && vy<=0){py=top; vy=0; onG=true;}
                }
            });
            if(py<-5){px=0; py=2; pz=0; vy=0;}
            player.position.set(px, py, pz);
            camera.position.set(px, py+5, pz+8); camera.lookAt(px, py+1, pz);
            renderer.render(scene, camera); requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
