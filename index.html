    <title>Brainrot Obby - Visible Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #gui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; z-index: 10; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.8); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; }
        #jump { background: #ff00ff; width: 80px; height: 80px; }
    </style>
</head>

        <div id="fwd" class="btn" style="background:white; color:black;">VOR</div>
        <div id="right" class="btn">R</div>
        <div id="jump" class="btn">JUMP</div>
    </div>
