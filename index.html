<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #55ccff; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.5); border-radius: 15px; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 25px; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="title">BACON OBBY</h2>
        <p id="debug">Lädt...</p>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 15px;">
            <div id="btnLeft" class="btn">◀</div>
            <div id="btnRight" class="btn">▶</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        window.onerror = function(msg) { document.getElementById('debug').innerText = "Fehler: " + msg; };

        try {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x55ccff);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 15, 10);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // CHARAKTER
            const player = new THREE.Group();
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
            const torseMat = new THREE.MeshStandardMaterial({ color: 0x3333ee });
            const hairMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f });

            const torse = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.4), torseMat);
            torse.position.y = 0.4;
            player.add(torse);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), skinMat);
            head.position.y = 1.0;
            player.add(head);

            const bacon = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.1, 0.45), hairMat);
            bacon.position.y = 1.25;
            player.add(bacon);

            scene.add(player);
            document.getElementById('debug').innerText = "Avatar geladen! Spring!";

            // WELT
            const platforms = [];
            function addBlock(x, y, z, w, d, c) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: c }));
                b.position.set(x, y, z);
                scene.add(b);
                b.userData = { w, d };
                platforms.push(b);
            }

            addBlock(0, -0.25, 0, 4, 4, 0x888888);   // Start
            addBlock(0, 0, -5, 2, 2, 0x00ff00);      // Block 1
            addBlock(1.5, 0.5, -8, 2, 2, 0x00ffff);  // Block 2
            addBlock(-1.5, 1.0, -11, 2, 2, 0xff00ff);// Block 3
            addBlock(0, 1.5, -15, 4, 4, 0xffff00);   // Ziel

            const lava = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0xff4400 }));
            lava.rotation.x = -Math.PI/2; lava.position.y = -4;
            scene.add(lava);

            // STEUERUNG
            let px = 0, py = 2, pz = 0, vy = 0;
            let keys = { a: false, d: false, w: false, s: false };
            let onGround = false;

            window.addEventListener('keydown', (e) => {
                if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
                if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
                if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
                if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
                if(e.code === 'Space' && onGround) vy = 0.15;
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
                if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
                if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
                if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
            });

            document.getElementById('btnLeft').ontouchstart = () => keys.a = true;
            document.getElementById('btnLeft').ontouchend = () => keys.a = false;
            document.getElementById('btnRight').ontouchstart = () => keys.d = true;
            document.getElementById('btnRight').ontouchend = () => keys.d = false;
            document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.15; };

            function animate() {
                if(keys.a) px -= 0.1; if(keys.d) px += 0.1;
                if(keys.w) pz -= 0.1; if(keys.s) pz += 0.1;

                vy -= 0.008; py += vy;
                onGround = false;

                platforms.forEach(p => {
                    let dx = Math.abs(px - p.position.x);
                    let dz = Math.abs(pz - p.position.z);
                    if(dx < p.userData.w/2 + 0.2 && dz < p.userData.d/2 + 0.2) {
                        let top = p.position.y + 0.25;
                        if(py <= top && py > top - 0.4 && vy <= 0) {
                            py = top; vy = 0; onGround = true;
                        }
                    }
                });

                if(py < -3) { px = 0; py = 2; pz = 0; vy = 0; }

                player.position.set(px, py, pz);
                camera.position.set(px, py + 4, pz + 6);
                camera.lookAt(px, py, pz - 2);

                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
        } catch(e) { document.getElementById('debug').innerText = e.message; }
    </script>
</body>
</html>
