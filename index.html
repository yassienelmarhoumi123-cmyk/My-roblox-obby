<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Battle Obby - Touch & Keyboard Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial Black', sans-serif; touch-action: none; }
        .ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; display: flex; }
        .player-ui { flex: 1; padding: 15px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10; font-size: 12px; }
        .score-box { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); display: inline-block; }
        .controls-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .btn-group { display: flex; gap: 4px; pointer-events: auto; }
        .btn { width: 45px; height: 45px; background: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; -webkit-user-select: none; }
        #divider { position: absolute; left: 50%; width: 2px; height: 100%; background: white; z-index: 50; transform: translateX(-50%); opacity: 0.3; }
        #win-msg { position: absolute; top: 40%; width: 100%; text-align: center; color: gold; font-size: 40px; font-weight: bold; text-shadow: 4px 4px #000; display: none; z-index: 200; }
    </style>
</head>
<body>
    <div id="win-msg">GEWONNEN! 🏆</div>
    <div id="divider"></div>
    <div class="ui-container">
        <div class="player-ui"><div class="score-box">P1: <span id="s1">0</span>/100<br>Q/E oder Wischen</div></div>
        <div class="player-ui" style="text-align: right;"><div class="score-box">P2: <span id="s2">0</span>/100<br>,/. oder Wischen</div></div>
    </div>

    <div class="controls-container">
        <div class="btn-group">
            <div id="p1L" class="btn">A</div><div id="p1F" class="btn">W</div><div id="p1R" class="btn">D</div>
            <div id="p1Hit" class="btn" style="background:red">HIT</div><div id="p1J" class="btn" style="background:green">JMP</div>
        </div>
        <div class="btn-group">
            <div id="p2L" class="btn">←</div><div id="p2F" class="btn">↑</div><div id="p2R" class="btn">→</div>
            <div id="p2Hit" class="btn" style="background:red">HIT</div><div id="p2J" class="btn" style="background:green">JMP</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.autoClear = false;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(20, 100, 20);
        scene.add(sun);

        const cam1 = new THREE.PerspectiveCamera(75, (window.innerWidth/2)/window.innerHeight, 0.1, 1000);
        const cam2 = new THREE.PerspectiveCamera(75, (window.innerWidth/2)/window.innerHeight, 0.1, 1000);

        class Player {
            constructor(id, color, startX) {
                this.id = id;
                this.group = new THREE.Group();
                this.mat = new THREE.MeshStandardMaterial({ color: color });
                this.body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), this.mat);
                this.group.add(this.body);
                this.bat = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.6, 0.3), new THREE.MeshStandardMaterial({ color: 0x444444 }));
                this.bat.position.set(0.7, 0, 0.6);
                this.group.add(this.bat);
                scene.add(this.group);
                this.spawn(startX);
                this.keys = {}; this.knockback = {x:0, z:0};
                this.hitCooldown = 0; this.respawnTimer = 0; this.lastTouchX = 0;
            }
            spawn(startX) {
                this.x = startX; this.y = 10; this.z = 10;
                this.vy = 0; this.yaw = 0; this.score = 0;
                this.respawnTimer = 60;
            }
        }
        const p1 = new Player(1, 0x0055ff, -4); 
        const p2 = new Player(2, 0xff2222, 4);

        const platforms = [];
        const colors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x9400d3];
        for(let i=0; i<=100; i++) {
            let size = (i===0) ? 25 : 8;
            const b = new THREE.Mesh(
                new THREE.BoxGeometry(size, 1.2, size),
                new THREE.MeshStandardMaterial({ color: (i===0)?0xcccccc : (i===100?0xffd700 : colors[i % colors.length]) })
            );
            if(i > 0) {
                let a = i * 0.45;
                b.position.set(Math.sin(a)*13, i*2.2, Math.cos(a)*13);
            } else b.position.set(0, 0, 0);
            b.userData = { r: size/2, y: b.position.y, id: i };
            scene.add(b); platforms.push(b);
        }

        const handleKey = (e, val) => {
            if(e.code === 'KeyW') p1.keys.f = val; if(e.code === 'KeyS') p1.keys.b = val;
            if(e.code === 'KeyA') p1.keys.l = val; if(e.code === 'KeyD') p1.keys.r = val;
            if(e.code === 'KeyQ') p1.keys.rl = val; if(e.code === 'KeyE') p1.keys.rr = val;
            if(e.code === 'Space') p1.keys.j = val; if(e.code === 'KeyF') p1.keys.hit = val;
            if(e.code === 'ArrowUp') p2.keys.f = val; if(e.code === 'ArrowDown') p2.keys.b = val;
            if(e.code === 'ArrowLeft') p2.keys.l = val; if(e.code === 'ArrowRight') p2.keys.r = val;
            if(e.code === 'Comma') p2.keys.rl = val; if(e.code === 'Period') p2.keys.rr = val;
            if(e.code === 'Enter') p2.keys.j = val; 
            if(e.code.includes('Alt')) { e.preventDefault(); p2.keys.hit = val; }
        };
        window.onkeydown = (e) => handleKey(e, true);
        window.onkeyup = (e) => handleKey(e, false);

        // TOUCH DREHUNG REPARIERT
        window.ontouchstart = (e) => {
            for(let t of e.touches) {
                if(t.pageX < window.innerWidth/2) p1.lastTouchX = t.pageX;
                else p2.lastTouchX = t.pageX;
            }
        };
        window.ontouchmove = (e) => {
            for(let t of e.touches) {
                if(t.target.className.indexOf('btn') === -1) {
                    if(t.pageX < window.innerWidth/2) {
                        p1.yaw -= (t.pageX - p1.lastTouchX) * 0.015;
                        p1.lastTouchX = t.pageX;
                    } else {
                        p2.yaw -= (t.pageX - p2.lastTouchX) * 0.015;
                        p2.lastTouchX = t.pageX;
                    }
                }
            }
        };

        function updatePlayer(p, cam, other) {
            p.vy -= 0.012; p.y += p.vy;
            if(p.hitCooldown > 0) p.hitCooldown--;
            if(p.respawnTimer > 0) {
                p.respawnTimer--;
                p.mat.opacity = (p.respawnTimer % 10 < 5) ? 0.3 : 1;
                p.mat.transparent = true;
            } else { p.mat.opacity = 1; }

            if(p.keys.rl) p.yaw += 0.05; if(p.keys.rr) p.yaw -= 0.05;

            let speed = 0.22;
            let moveX = p.knockback.x, moveZ = p.knockback.z;
            p.knockback.x *= 0.9; p.knockback.z *= 0.9;

            if(p.keys.f) { moveX += Math.sin(p.yaw) * speed; moveZ += Math.cos(p.yaw) * speed; }
            if(p.keys.b) { moveX -= Math.sin(p.yaw) * speed; moveZ -= Math.cos(p.yaw) * speed; }
            if(p.keys.l) { moveX += Math.cos(p.yaw) * speed; moveZ -= Math.sin(p.yaw) * speed; }
            if(p.keys.r) { moveX -= Math.cos(p.yaw) * speed; moveZ += Math.sin(p.yaw) * speed; }
            p.x += moveX; p.z += moveZ;

            let onG = false;
            platforms.forEach(pl => {
                if(Math.abs(p.x - pl.position.x) < pl.userData.r + 0.4 && Math.abs(p.z - pl.position.z) < pl.userData.r + 0.4) {
                    let ground = pl.userData.y + 0.6;
                    if(p.y <= ground + 1.8 && p.y > ground - 1.0) {
                        p.y = ground + 1.8; p.vy = 0; onG = true;
                        p.score = Math.max(p.score, pl.userData.id);
                        document.getElementById('s'+p.id).innerText = p.score;
                        if(p.score === 100) document.getElementById('win-msg').style.display = 'block';
                    }
                }
            });

            if(onG && p.keys.j) p.vy = 0.35;
            if(p.y < -30) { p.spawn((p.id===1)?-4:4); p.knockback = {x:0, z:0}; }
            
            p.group.position.set(p.x, p.y - 1, p.z);
            p.group.rotation.y = p.yaw;
            p.bat.rotation.x = p.keys.hit ? -1.2 : 0;

            if(p.keys.hit && p.hitCooldown <= 0) {
                let d = Math.sqrt((p.x-other.x)**2 + (p.z-other.z)**2);
                if(d < 3.5 && Math.abs(p.y-other.y) < 2.5 && other.respawnTimer <= 0) {
                    let a = Math.atan2(other.x-p.x, other.z-p.z);
                    other.knockback.x = Math.sin(a)*1.5; other.knockback.z = Math.cos(a)*1.5;
                    p.hitCooldown = 30;
                    other.mat.emissive.setHex(0xffffff);
                    setTimeout(() => other.mat.emissive.setHex(0x000000), 100);
                }
            }
            cam.position.set(p.x - Math.sin(p.yaw)*9, p.y + 5, p.z - Math.cos(p.yaw)*9);
            cam.lookAt(p.x, p.y + 1, p.z);
        }

        function loop() {
            updatePlayer(p1, cam1, p2); updatePlayer(p2, cam2, p1);
            let w = window.innerWidth, h = window.innerHeight;
            renderer.setViewport(0, 0, w/2, h); renderer.setScissor(0, 0, w/2, h);
            renderer.setScissorTest(true); renderer.render(scene, cam1);
            renderer.setViewport(w/2, 0, w/2, h); renderer.setScissor(w/2, 0, w/2, h);
            renderer.setScissorTest(true); renderer.render(scene, cam2);
            requestAnimationFrame(loop);
        }
        loop();

        const setupBtn = (id, p, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); e.stopPropagation(); p.keys[k] = true; };
            el.ontouchend = (e) => { e.preventDefault(); e.stopPropagation(); p.keys[k] = false; };
        };
        ['F','L','R','Hit','J'].forEach(k => { setupBtn('p1'+k, p1, k.toLowerCase()); setupBtn('p2'+k, p2, k.toLowerCase()); });

        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            cam1.aspect = cam2.aspect = (window.innerWidth/2)/window.innerHeight;
            cam1.updateProjectionMatrix(); cam2.updateProjectionMatrix();
        };
    </script>
</body>
</html>
