<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - Infinite Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #scoreBox { font-size: 24px; font-weight: bold; color: #00ff88; }
        #highBox { font-size: 16px; opacity: 0.8; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.7); border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; pointer-events: auto; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreBox">Score: 0</div>
        <div id="highBox">Best: 0</div>
    </div>
    <div id="crosshair"></div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div id="btnLeft" class="btn">L</div>
            <div id="btnRight" class="btn">R</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. SZENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x22aaff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(5, 15, 5);
        scene.add(sun);

        // 2. VARIABLEN
        let px = 0, py = 2, pz = 0, vy = 0;
        let moveX = 0, yaw = 0, pitch = 0, onGround = false;
        let score = 0;
        let highscore = localStorage.getItem('obbyHighscore') || 0;
        document.getElementById('highBox').innerText = "Best: " + highscore;

        const platforms = [];
        let nextZ = 0;
        let nextX = 0;
        let nextY = 0;

        // 3. GENERATOR
        function addBlock(isStart = false) {
            const w = isStart ? 10 : 6;
            const d = isStart ? 10 : 6;
            const color = isStart ? 0x444444 : new THREE.Color(`hsl(${Math.random() * 360}, 80%, 60%)`);
            
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: color }));
            
            if (!isStart) {
                nextZ -= 9; // Feste Distanz
                nextX += (Math.random() - 0.5) * 5; // Leichte Kurve
                nextY += 0.5;
            }
            
            b.position.set(nextX, nextY, nextZ);
            scene.add(b);
            b.userData = { w, d, id: platforms.length };
            platforms.push(b);
        }

        // Erste Blöcke bauen
        for(let i=0; i<20; i++) { addBlock(i === 0); }

        // 4. TOUCH & STEUERUNG
        let startX = 0, startY = 0;
        window.addEventListener('touchstart', e => { startX = e.touches[0].pageX; startY = e.touches[0].pageY; });
        window.addEventListener('touchmove', e => {
            let dx = e.touches[0].pageX - startX;
            let dy = e.touches[0].pageY - startY;
            yaw -= dx * 0.007; pitch -= dy * 0.007;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
            startX = e.touches[0].pageX; startY = e.touches[0].pageY;
        });

        document.getElementById('btnLeft').ontouchstart = () => moveX = -0.15;
        document.getElementById('btnRight').ontouchstart = () => moveX = 0.15;
        document.getElementById('btnLeft').ontouchend = document.getElementById('btnRight').ontouchend = () => moveX = 0;
        document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.25; };

        // 5. GAME LOOP
        function loop() {
            vy -= 0.01; py += vy;
            px += Math.cos(yaw) * moveX; pz += Math.sin(yaw) * moveX;
            pz -= Math.cos(yaw) * 0.08; px -= Math.sin(yaw) * 0.08; // Dauerlauf

            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(px - p.position.x);
                let dz = Math.abs(pz - p.position.z);
                if(dx < p.userData.w/2 + 0.3 && dz < p.userData.d/2 + 0.3) {
                    let top = p.position.y + 0.25;
                    if(py <= top + 1.5 && py > top) {
                        py = top + 1.5; vy = 0; onGround = true;
                        if(p.userData.id > score) {
                            score = p.userData.id;
                            document.getElementById('scoreBox').innerText = "Score: " + score;
                            if(platforms.length - score < 10) addBlock();
                        }
                    }
                }
            });

            if(py < -15) {
                if(score > highscore) {
                    highscore = score;
                    localStorage.setItem('obbyHighscore', highscore);
                    document.getElementById('highBox').innerText = "Best: " + highscore;
                }
                location.reload(); // Sicherster Reset gegen "Grauen Screen"
            }

            camera.position.set(px, py, pz);
            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw; camera.rotation.x = pitch;

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
