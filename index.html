<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Hair Obby v2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.4); border-radius: 20px; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; pointer-events: auto; -webkit-user-select: none; }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0;">BACON OBBY</h2>
        <p id="stat">Spring über die Blöcke!</p>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div id="btnLeft" class="btn">◀</div>
            <div id="btnRight" class="btn">▶</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- SZENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x33ccff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Licht
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- SPIELER ---
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.4), new THREE.MeshStandardMaterial({ color: 0xee6c4d }));
        body.position.y = 0.45;
        playerGroup.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
        head.position.y = 1.1;
        playerGroup.add(head);
        const hair = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.5), new THREE.MeshStandardMaterial({ color: 0x3d2b1f }));
        hair.position.y = 1.35;
        playerGroup.add(hair);
        scene.add(playerGroup);

        // --- WELT ---
        const platforms = [];
        const lavaY = -2;

        function createPlatform(x, y, z, w, d, color = 0xffffff) {
            const geo = new THREE.BoxGeometry(w, 0.6, d);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const p = new THREE.Mesh(geo, mat);
            p.position.set(x, y, z);
            scene.add(p);
            // Box für Kollision speichern
            p.userData.width = w;
            p.userData.depth = d;
            platforms.push(p);
        }

        // Level Design
        createPlatform(0, 0, 0, 4, 4, 0x98c1d9); // Start
        createPlatform(0, 0.5, -6, 2, 2, 0xe0fbfc);
        createPlatform(3, 1, -10, 2, 2, 0xee6c4d);
        createPlatform(-3, 1.5, -14, 2, 2, 0x3d5a80);
        createPlatform(0, 2, -19, 3, 3, 0xffd166); // Ziel

        // Lava Boden
        const lavaGeo = new THREE.PlaneGeometry(100, 100);
        const lavaMat = new THREE.MeshStandardMaterial({ color: 0xff4500, emissive: 0xff0000 });
        const lava = new THREE.Mesh(lavaGeo, lavaMat);
        lava.rotation.x = -Math.PI / 2;
        lava.position.y = lavaY;
        scene.add(lava);

        // --- PHYSIK & STEUERUNG ---
        let py = 5, px = 0, pz = 0;
        let vy = 0;
        let moveState = { l: false, r: false };
        let onGround = false;

        // Button Events
        const bL = document.getElementById('btnLeft');
        const bR = document.getElementById('btnRight');
        const bJ = document.getElementById('btnJump');

        bL.ontouchstart = (e) => { e.preventDefault(); moveState.l = true; };
        bL.ontouchend = () => moveState.l = false;
        bR.ontouchstart = (e) => { e.preventDefault(); moveState.r = true; };
        bR.ontouchend = () => moveState.r = false;
        bJ.ontouchstart = (e) => { e.preventDefault(); if(onGround) vy = 0.2; };

        function update() {
            // Seitwärts bewegen
            if(moveState.l) px -= 0.08;
            if(moveState.r) px += 0.08;
            
            // Automatisch vorwärts
            pz -= 0.05;

            // Schwerkraft
            vy -= 0.01;
            py += vy;

            // KOLLISIONSPRÜFUNG
            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(px - p.position.x);
                let dz = Math.abs(pz - p.position.z);
                
                // Prüfen ob Spieler über dem Block ist
                if(dx < p.userData.width/2 + 0.2 && dz < p.userData.depth/2 + 0.2) {
                    let groundLevel = p.position.y + 0.3; 
                    if(py <= groundLevel && py > groundLevel - 0.5 && vy <= 0) {
                        py = groundLevel;
                        vy = 0;
                        onGround = true;
                    }
                }
            });

            // Lava-Tod
            if(py < lavaY + 0.5) {
                px = 0; py = 2; pz = 0; vy = 0;
            }

            // Position setzen
            playerGroup.position.set(px, py, pz);
            
            // Kamera folgt
            camera.position.set(px, py + 3, pz + 6);
            camera.lookAt(px, py + 1, pz - 2);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
