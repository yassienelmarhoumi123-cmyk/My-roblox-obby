<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - Keyboard & Touch</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.5); border-radius: 15px; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 25px; pointer-events: auto; }
        @media (min-width: 800px) { .controls { display: none; } } /* Versteckt Touch-Buttons am PC */
    </style>
</head>
<body>
    <div id="ui">
        <h2>BACON OBBY</h2>
        <p>Steuerung: WASD, Pfeiltasten oder Buttons</p>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 15px;">
            <div id="btnLeft" class="btn">◀</div>
            <div id="btnRight" class="btn">▶</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x44ccff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 15, 10);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // SPIELER
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.4), new THREE.MeshStandardMaterial({ color: 0xee6c4d }));
        body.position.y = 0.45;
        player.add(body);
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
        head.position.y = 1.1;
        player.add(head);
        const hair = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.5), new THREE.MeshStandardMaterial({ color: 0x3d2b1f }));
        hair.position.y = 1.35;
        player.add(hair);
        scene.add(player);

        // WELT
        const platforms = [];
        function createBlock(x, y, z, w, d, color = 0xffffff) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.6, d), new THREE.MeshStandardMaterial({ color }));
            b.position.set(x, y, z);
            scene.add(b);
            b.userData = { w, d };
            platforms.push(b);
        }

        // Level Design (Engere Abstände)
        createBlock(0, 0, 0, 5, 5, 0x777777);     // Start
        createBlock(0, 0.3, -5, 3, 3, 0x00ff00);   // Block 1
        createBlock(2, 0.7, -9, 2, 2, 0x00eeee);   // Block 2
        createBlock(-2, 1.2, -13, 2, 2, 0xff00ff); // Block 3
        createBlock(0, 1.6, -17, 4, 4, 0xffff00);  // Ziel

        // Lava
        const lava = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0xff4400 }));
        lava.rotation.x = -Math.PI/2; lava.position.y = -3;
        scene.add(lava);

        // STEUERUNG LOGIK
        let px = 0, py = 5, pz = 0, vy = 0;
        let keys = { a: false, d: false, w: false, s: false, space: false };
        let onGround = false;

        // Tastatur Events
        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
            if(e.code === 'Space') { if(onGround) vy = 0.18; }
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
        });

        // Touch Events
        const bL = document.getElementById('btnLeft');
        const bR = document.getElementById('btnRight');
        const bJ = document.getElementById('btnJump');
        bL.ontouchstart = () => keys.a = true; bL.ontouchend = () => keys.a = false;
        bR.ontouchstart = () => keys.d = true; bR.ontouchend = () => keys.d = false;
        bJ.ontouchstart = () => { if(onGround) vy = 0.18; };

        function loop() {
            if(keys.a) px -= 0.1;
            if(keys.d) px += 0.1;
            if(keys.w) pz -= 0.1;
            if(keys.s) pz += 0.1;

            vy -= 0.008; // Schwerkraft
            py += vy;

            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(px - p.position.x);
                let dz = Math.abs(pz - p.position.z);
                if(dx < p.userData.w/2 + 0.2 && dz < p.userData.d/2 + 0.2) {
                    let top = p.position.y + 0.3;
                    if(py <= top && py > top - 0.5 && vy <= 0) {
                        py = top; vy = 0; onGround = true;
                    }
                }
            });

            if(py < -2) { px = 0; py = 2; pz = 0; vy = 0; } // Respawn

            player.position.set(px, py, pz);
            camera.position.set(px, py + 4, pz + 7);
            camera.lookAt(px, py, pz - 2);

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        loop();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
