<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - Touch Look</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; }
        .noise { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; opacity: 0.08; pointer-events: none; background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_v2.png'); }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 80px; height: 80px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 25px; pointer-events: auto; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div id="crosshair"></div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div id="btnLeft" class="btn">◀</div>
            <div id="btnRight" class="btn">▶</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x22aaff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        // WELT - BLÖCKE EXTREM NAH (Abstand nur 3-4 statt 8)
        const platforms = [];
        function block(x, y, z, w, d, c) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: c }));
            b.position.set(x, y, z);
            scene.add(b);
            b.userData = { w, d };
            platforms.push(b);
        }

        block(0, -0.3, 0, 10, 10, 0x333333); // Start
        block(0, 0.2, -5, 5, 5, 0x00ff88);   // Sehr nah
        block(1, 0.8, -9, 5, 5, 0x00ccff);   // Sehr nah
        block(-1, 1.4, -13, 5, 5, 0xff0088); // Sehr nah
        block(0, 2.0, -18, 10, 10, 0xffdd00); // Riesen-Ziel

        // SPIELER & KAMERA DREHUNG
        let px = 0, py = 2, pz = 0, vy = 0;
        let moveX = 0;
        let onGround = false;
        let yaw = 0, pitch = 0; // Für die Drehung

        // TOUCH LOOK (Umschauen)
        let lastTouchX = 0, lastTouchY = 0;
        window.addEventListener('touchstart', e => {
            lastTouchX = e.touches[0].pageX;
            lastTouchY = e.touches[0].pageY;
        });

        window.addEventListener('touchmove', e => {
            let touchX = e.touches[0].pageX;
            let touchY = e.touches[0].pageY;
            yaw -= (touchX - lastTouchX) * 0.005;
            pitch -= (touchY - lastTouchY) * 0.005;
            pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch)); // Begrenzung
            lastTouchX = touchX;
            lastTouchY = touchY;
        });

        document.getElementById('btnLeft').ontouchstart = () => moveX = -0.15;
        document.getElementById('btnRight').ontouchstart = () => moveX = 0.15;
        document.getElementById('btnLeft').ontouchend = document.getElementById('btnRight').ontouchend = () => moveX = 0;
        document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.25; };

        function loop() {
            // Richtung berechnen
            const dirX = Math.sin(yaw);
            const dirZ = Math.cos(yaw);
            const sideX = Math.sin(yaw + Math.PI/2);
            const sideZ = Math.cos(yaw + Math.PI/2);

            // Bewegung relativ zum Blickwinkel (Seitwärts laufen)
            px += sideX * moveX;
            pz += sideZ * moveX;
            
            // Automatischer Vorwärtsdrang in Blickrichtung (langsam)
            pz -= dirZ * 0.05;
            px -= dirX * 0.05;

            vy -= 0.01;
            py += vy;

            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(px - p.position.x);
                let dz = Math.abs(pz - p.position.z);
                if(dx < p.userData.w/2 + 0.2 && dz < p.userData.d/2 + 0.2) {
                    let top = p.position.y + 0.25;
                    if(py <= top + 1.2 && py > top && vy <= 0) {
                        py = top + 1.2; vy = 0; onGround = true;
                    }
                }
            });

            if(py < -15) { px = 0; py = 3; pz = 0; vy = 0; }

            camera.position.set(px, py, pz);
            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        loop();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
