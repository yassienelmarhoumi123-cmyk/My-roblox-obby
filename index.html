<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Battle Obby - Fixed View</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        .ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; display: flex; }
        .player-ui { flex: 1; padding: 15px; color: white; text-shadow: 2px 2px 4px #000; font-size: 14px; z-index: 10; }
        .controls-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .btn-group { display: flex; gap: 4px; pointer-events: auto; }
        .btn { width: 48px; height: 48px; background: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; -webkit-user-select: none; }
        #divider { position: absolute; left: 50%; width: 2px; height: 100%; background: white; z-index: 50; transform: translateX(-50%); }
        #win-msg { position: absolute; top: 40%; width: 100%; text-align: center; color: gold; font-size: 40px; font-weight: bold; text-shadow: 4px 4px #000; display: none; z-index: 200; pointer-events: none; }
    </style>
</head>
<body>
    <div id="win-msg">GEWONNEN!</div>
    <div id="divider"></div>
    <div class="ui-container">
        <div class="player-ui">P1 (Blau): <span id="s1">0</span>/100</div>
        <div class="player-ui" style="text-align: right;">P2 (Rot): <span id="s2">0</span>/100</div>
    </div>

    <div class="controls-container">
        <div class="btn-group">
            <div id="p1L" class="btn">A</div>
            <div id="p1F" class="btn" style="background:white;color:black">W</div>
            <div id="p1R" class="btn">D</div>
            <div id="p1Hit" class="btn" style="background:red">HIT</div>
            <div id="p1J" class="btn" style="background:green">JMP</div>
        </div>
        <div class="btn-group">
            <div id="p2L" class="btn">←</div>
            <div id="p2F" class="btn" style="background:white;color:black">↑</div>
            <div id="p2R" class="btn">→</div>
            <div id="p2Hit" class="btn" style="background:red">HIT</div>
            <div id="p2J" class="btn" style="background:green">JMP</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.autoClear = false;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        const cam1 = new THREE.PerspectiveCamera(75, (window.innerWidth/2)/window.innerHeight, 0.1, 1000);
        const cam2 = new THREE.PerspectiveCamera(75, (window.innerWidth/2)/window.innerHeight, 0.1, 1000);

        class Player {
            constructor(id, color, startX) {
                this.id = id;
                this.group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: color }));
                this.group.add(body);
                this.bat = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 0.3), new THREE.MeshStandardMaterial({ color: 0x444444 }));
                this.bat.position.set(0.7, 0, 0.5);
                this.group.add(this.bat);
                scene.add(this.group);
                this.x = startX; this.y = 10; this.z = 10; // Höherer Start
                this.vy = 0; this.yaw = 0; this.score = 0;
                this.keys = {}; this.knockback = {x:0, z:0};
                this.hitCooldown = 0;
                this.lastTouchX = 0;
            }
        }
        const p1 = new Player(1, 0x0000ff, -3); 
        const p2 = new Player(2, 0xff0000, 3);

        const platforms = [];
        const colors = [0xff0000, 0xff7f00, 0xffff00,
