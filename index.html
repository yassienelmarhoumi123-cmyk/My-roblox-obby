<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Spiral Obby - Safe Start</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* UI FÜR HÖHE */
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #scoreBox { font-size: 28px; font-weight: bold; color: #fff; }

        /* MOBILE STEUERUNG */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 85px; height: 85px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; pointer-events: auto; font-weight: bold; }
        
        /* FADENKREUZ */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 2px solid #ffffff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="ui"><div id="scoreBox">Höhe: 0</div></div>
    <div id="crosshair"></div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div id="btnLeft" class="btn">L</div>
            <div id="btnRight" class="btn">R</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Himmelblau durchgehend
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // --- VARIABLEN & PHYSIK ---
        let px = 0, py = 2, pz = 15, vy = 0; // Startposition
        let moveX = 0, yaw = 0, pitch = 0, onGround = false;
        let score = 0;
        const rainbow = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x9400d3];

        const platforms = [];
        let angle = 0;
        let radius = 10;
        let currentHeight = 0;
        let startPlatformLength = 50; // Länge der geraden Startbahn

        // --- GENERATOR: GERADER START & UNENDLICHE SPIRALE ---
        function addPlatform(isSpiral = false, lengthFactor = 0) {
            let w, d, color;
            let platformPos;

            if (!isSpiral) {
                // Gerade Startbahn (Weiß)
                w = 10;
                d = startPlatformLength;
                color = 0xeeeeee;
                platformPos = new THREE.Vector3(0, 0, 0); // Start-Position
            } else {
                // Spirale-Blöcke (Bunt)
                w = 6;
                d = 6;
                color = rainbow[platforms.length % rainbow.length];
                
                // Spiral-Formel
                angle += 0.45;
                currentHeight += 1.3;
                let spiralX = Math.cos(angle) * radius;
                let spiralZ = Math.sin(angle) * radius;
                platformPos = new THREE.Vector3(spiralX, currentHeight, spiralZ - startPlatformLength/2 - 10);
            }
            
            const material = new THREE.MeshStandardMaterial({ color: color });
            if (!isSpiral) material.emissive = new THREE.Color(0x333333); // Startbahn leicht leuchten lassen

            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.8, d), material);
            b.position.copy(platformPos);
            
            // Spirale nach innen ausrichten, Startbahn gerade lassen
            if (isSpiral) b.lookAt(0, currentHeight, 0); 

            scene.add(b);
            b.userData = { w, d, id: platforms.length, isSpiral };
            platforms.push(b);
        }

        // --- LEVEL INITIALISIERUNG ---
        addPlatform(false); // 1. Start-Bahn (Gerade)
        
        // Füge die ersten 20 Spiral-Blöcke hinzu, weit entfernt von der Start-Kante
        for(let i=0; i<30; i++) { addPlatform(true); }

        // --- STEUERUNG FIX (Tastatur Space) ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && onGround) {
                vy = 0.28; // Sprungkraft
                onGround = false;
            }
            if (e.code === 'KeyA') moveX = -0.16; // Links
            if (e.code === 'KeyD') moveX = 0.16; // Rechts
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'KeyD') moveX = 0;
        });

        // --- TOUCH-LOOK FÜR MOBILE ---
        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', e => { touchStartX = e.touches[0].pageX; touchStartY = e.touches[0].pageY; });
        window.addEventListener('touchmove', e => {
            let dx = e.touches[0].pageX - touchStartX;
            let dy = e.touches[0].pageY - touchStartY;
            yaw -= dx * 0.006; pitch -= dy * 0.006;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
            touchStartX = e.touches[0].pageX; touchStartY = e.touches[0].pageY;
        });

        // --- MOBILE BUTTONS ---
        document.getElementById('btnLeft').ontouchstart = () => moveX = -0.16;
        document.getElementById('btnRight').ontouchstart = () => moveX = 0.16;
        document.getElementById('btnLeft').ontouchend = document.getElementById('btnRight').ontouchend = () => moveX = 0;
        document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.28; };

        // --- INITIAL POSITION & KAMERA ---
        px = 0; py = 2.5; pz = 18; // Startpunkt auf der Bahn, nicht an der Kante
        yaw = 0; // Nach vorne blicken

        // --- GAME LOOP ---
        function loop() {
            vy -= 0.01; py += vy; // Schwerkraft
            
            // Bewegung relativ zur Blickrichtung
            px += Math.cos(yaw) * moveX;
            pz += Math.sin(yaw) * moveX;
            
            // Automatischer Vorwärtsdr
