<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - Noise Effect</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; }
        
        /* RAUSCHEN-EFFEKT (Film Grain) */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 5;
            opacity: 0.08; /* Stärke des Rauschens (höher = mehr) */
            pointer-events: none;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_v2.png');
        }

        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 25px; pointer-events: auto; }
    </style>
</head>
<body>
    <div class="noise"></div> <div id="ui">
        <h2>BACON OBBY</h2>
        <p id="debug">Lädt...</p>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 15px;">
            <div id="btnLeft" class="btn">◀</div>
            <div id="btnRight" class="btn">▶</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // SZENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x22aaff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // LICHT
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // AVATAR (Kästen-Modell bis du deine Datei schickst)
        const player = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0xee6c4d });
        const char = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.4), mat);
        player.add(char);
        scene.add(player);

        // WELT
        const platforms = [];
        function block(x, y, z, w, d, c) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: c }));
            b.position.set(x, y, z);
            scene.add(b);
            b.userData = { w, d };
            platforms.push(b);
        }

        block(0, -0.3, 0, 5, 5, 0x333333); // Start
        block(0, 0, -6, 3, 3, 0x00ff88);   // Block 1
        block(2, 0.6, -11, 2, 2, 0x00ccff); // Block 2
        block(-2, 1.2, -16, 2, 2, 0xff0088); // Block 3
        block(0, 1.8, -22, 5, 5, 0xffdd00); // Ziel

        // PHYSIK
        let px = 0, py = 5, pz = 0, vy = 0;
        let keys = { a: false, d: false, w: false, s: false };
        let onGround = false;

        // INPUT
        window.addEventListener('keydown', e => {
            if(e.code === 'KeyA') keys.a = true; if(e.code === 'KeyD') keys.d = true;
            if(e.code === 'KeyW') keys.w = true; if(e.code === 'KeyS') keys.s = true;
            if(e.code === 'Space' && onGround) vy = 0.16;
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'KeyA') keys.a = false; if(e.code === 'KeyD') keys.d = false;
            if(e.code === 'KeyW') keys.w = false; if(e.code === 'KeyS') keys.s = false;
        });
        
        document.getElementById('btnLeft').ontouchstart = () => keys.a = true;
        document.getElementById('btnLeft').ontouchend = () => keys.a = false;
        document.getElementById('btnRight').ontouchstart = () => keys.d = true;
        document.getElementById('btnRight').ontouchend = () => keys.d = false;
        document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.16; };

        document.getElementById('debug').innerText = "Rauschen-Effekt aktiv!";

        function loop() {
            if(keys.a) px -= 0.12; if(keys.d) px += 0.12;
            if(keys.w) pz -= 0.12; if(keys.s) pz += 0.12;
            vy -= 0.008; py += vy;

            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(px - p.position.x);
                let dz = Math.abs(pz - p.position.z);
                if(dx < p.userData.w/2 + 0.3 && dz < p.userData.d/2 + 0.3) {
                    let top = p.position.y + 0.25;
                    if(py <= top && py > top - 0.4 && vy <= 0) {
                        py = top; vy = 0; onGround = true;
                    }
                }
            });

            if(py < -5) { px = 0; py = 2; pz = 0; vy = 0; }

            player.position.set(px, py, pz);
            camera.position.set(px, py + 5, pz + 8);
            camera.lookAt(px, py, pz - 2);

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
