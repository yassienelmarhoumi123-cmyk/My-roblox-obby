<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Obby - Hardcore Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; touch-action: none; }
        .noise { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; opacity: 0.1; pointer-events: none; background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Static_Noise_v2.png'); }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { width: 85px; height: 85px; background: rgba(0,0,0,0.7); border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; pointer-events: auto; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 2px solid #00ff00; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div id="crosshair"></div>

    <div class="controls">
        <div style="display: flex; gap: 20px;">
            <div id="btnLeft" class="btn">LINKS</div>
            <div id="btnRight" class="btn">RECHTS</div>
        </div>
        <div id="btnJump" class="btn">SPRUNG</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1188ff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.7);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const platforms = [];
        function block(x, y, z, w, d, c) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, 0.5, d), new THREE.MeshStandardMaterial({ color: c }));
            b.position.set(x, y, z);
            scene.add(b);
            b.userData = { w, d };
            platforms.push(b);
        }

        // --- LEVEL DESIGN: WEITE ABSTÄNDE (12-14 Einheiten) ---
        block(0, 0, 0, 10, 10, 0x333333);      // Start
        block(0, 1, -14, 4, 4, 0x00ff88);     // Riesiger Sprung 1
        block(4, 2, -28, 4, 4, 0x00ccff);     // Riesiger Sprung 2
        block(-4, 3, -42, 4, 4, 0xff0088);    // Riesiger Sprung 3
        block(0, 4, -56, 4, 4, 0x00ff88);     // Riesiger Sprung 4
        block(0, 5, -70, 4, 4, 0x00ccff);     // Riesiger Sprung 5
        block(0, 6, -85, 25, 25, 0xffcc00);   // GOLDENES ZIEL (Sehr weit!)

        let px = 0, py = 2, pz = 0, vy = 0;
        let moveX = 0, yaw = 0, pitch = 0, onGround = false;

        // TOUCH LOOK
        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', e => { touchStartX = e.touches[0].pageX; touchStartY = e.touches[0].pageY; });
        window.addEventListener('touchmove', e => {
            let dx = e.touches[0].pageX - touchStartX;
            let dy = e.touches[0].pageY - touchStartY;
            yaw -= dx * 0.006; pitch -= dy * 0.006;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
            touchStartX = e.touches[0].pageX; touchStartY = e.touches[0].pageY;
        });

        // TASTATUR (Leertaste/A/D)
        window.addEventListener('keydown', e => {
            if(e.code === 'Space' && onGround) vy = 0.3; 
            if(e.code === 'KeyA') moveX = -0.18;
            if(e.code === 'KeyD') moveX = 0.18;
        });
        window.addEventListener('keyup', e => { if(e.code === 'KeyA' || e.code === 'KeyD') moveX = 0; });

        // MOBILE BUTTONS
        document.getElementById('btnLeft').ontouchstart = () => moveX = -0.2;
        document.getElementById('btnRight').ontouchstart = () => moveX = 0.2;
        document.getElementById('btnLeft').ontouchend = document.getElementById('btnRight').ontouchend = () => moveX = 0;
        document.getElementById('btnJump').ontouchstart = () => { if(onGround) vy = 0.3; };

        function loop() {
            vy -= 0.01; py += vy;
            
            // Bewegung
            px += Math.cos(yaw) * moveX; pz += Math.sin(yaw) * moveX;
            // Vorwärts-Dauer-Speed (Erhöht für weite Sprünge)
            pz -= Math.cos(yaw) * 0.12; px -= Math.sin(yaw) * 0.12; 

            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(px - p.position.x);
                let dz = Math.abs(pz - p.position.z);
                if(dx < p.userData.w/2 + 0.3 && dz < p.userData.d/2 + 0.3) {
                    let top = p.position.y + 0.25;
                    if(py <= top + 1.5 && py > top) { py = top + 1.5; vy = 0; onGround = true; }
                }
            });

            if(py < -20) { px = 0; py = 3; pz = 0; vy = 0; yaw = 0; pitch = 0; }

            camera.position.set(px, py, pz);
            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw; camera.rotation.x = pitch;

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        loop();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
