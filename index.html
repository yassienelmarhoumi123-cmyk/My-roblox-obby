<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Obby - Ultimate Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; pointer-events: auto; font-weight: bold; }
        #pinPad { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 20px; border: 4px solid #00ff88; border-radius: 15px;
            display: none; flex-direction: column; align-items: center; z-index: 1000; pointer-events: auto;
        }
        #pinPad input { font-size: 24px; width: 120px; text-align: center; margin-bottom: 10px; }
        #pinPad button { padding: 10px 20px; background: #00ff88; border: none; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreBox" style="font-size:24px;">Höhe: 0</div>
        <div id="flyStatus" style="color: #00ff88; display:none; font-weight:bold;">FLUGMODUS AKTIV 🚀</div>
    </div>

    <div id="pinPad">
        <h3 style="color:white; margin:0 0 10px 0;">CODE: 1234</h3>
        <input type="number" id="pinInput" placeholder="PIN">
        <div style="display:flex;">
            <button onclick="checkPin()">OK</button>
            <button onclick="closePin()" style="background:red; color:white;">X</button>
        </div>
    </div>

    <div class="controls">
        <div id="btnLeft" class="btn">LINKS (A)</div>
        <div id="btnForward" class="btn" style="background:white; color:black;">VOR (W)</div>
        <div id="btnRight" class="btn">RECHTS (D)</div>
        <div id="btnJump" class="btn" style="background:#00ff00; color:black;">FLY/UP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // Spieler-Werte (Direkter Spawn auf Plattform 0)
        let px = 0, py = 2, pz = 5; 
        let vy = 0, moveX = 0, moveZ = 0, yaw = 0, pitch = -0.2;
        let score = 0, canFly = false, onGround = false;
        const platforms = [];

        // Maschine (Schwarz)
        const machine = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 3), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        machine.position.set(7, 2, 0);
        scene.add(machine);

        function addBlock(id) {
            let w = 8, d = 8, h = 1.2;
            const colors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x9400d3];
            let color = id === 0 ? 0xcccccc : colors[id % colors.length];
            if (id === 0) { w = 30; d = 30; }
            
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color }));
            let x = 0, y = 0, z = 0;
            if (id > 0) {
                let a = id * 0.45;
                x = Math.sin(a) * 15; z = id * -14; y = id * 2.5;
            }
            b.position.set(x, y, z);
            b.userData = { w, d, h, id };
            scene.add(b);
            platforms.push(b);
        }
        for(let i=0; i<80; i++) addBlock(i);

        // LOGIK
        function checkPin() {
            if(document.getElementById('pinInput').value === "1234") {
                canFly = true;
                document.getElementById('flyStatus').style.display = "block";
                closePin();
            } else { alert("Falsch!"); }
        }
        function closePin() { document.getElementById('pinPad').style.display = "none"; }

        // STEUERUNG (Tastatur & Buttons)
        const keys = {};
        window.onkeydown = (e) => { 
            keys[e.code] = true; 
            if(e.code === 'Space') { if(canFly) vy = 0.25; else if(onGround) vy = 0.35; }
        };
        window.onkeyup = (e) => { 
            keys[e.code] = false; 
            if(e.code === 'Space' && canFly) vy = 0;
        };

        const setup = (id, k) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; if(k === 'Space' && canFly) vy = 0.25; else if(k === 'Space' && onGround) vy = 0.35; };
            el.ontouchend = (e) => { e.preventDefault(); keys[k] = false; if(k === 'Space' && canFly) vy = 0; };
        };
        setup('btnLeft', 'KeyA'); setup('btnRight', 'KeyD'); setup('btnForward', 'KeyW'); setup('btnJump', 'Space');

        // Kamera-Drehung
        let lastX, lastY;
        window.ontouchstart = e => { lastX = e.touches[0].pageX; lastY = e.touches[0].pageY; };
        window.ontouchmove = e => {
            yaw -= (e.touches[0].pageX - lastX) * 0.008;
            pitch = Math.max(-1.4, Math.min(1.4, pitch - (e.touches[0].pageY - lastY) * 0.008));
            lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
        };

        function loop() {
            if(!canFly) vy -= 0.012;
            py += vy;

            moveX = (keys['KeyD'] ? 0.2 : 0) - (keys['KeyA'] ? 0.2 : 0);
            moveZ = (keys['KeyS'] ? 0.2 : 0) - (keys['KeyW'] ? 0.2 : 0);

            let nextPx = px + (Math.sin(yaw) * moveZ + Math.cos(yaw) * moveX);
            let nextPz = pz + (Math.cos(yaw) * moveZ - Math.sin(yaw) * moveX);

            // Maschine Check
            if(Math.sqrt((px-7)**2 + (pz-0)**2) < 3.5) document.getElementById('pinPad').style.display = "flex";

            onGround = false;
            platforms.forEach(p => {
                let dx = Math.abs(nextPx - p.position.x), dz = Math.abs(nextPz - p.position.z);
                if (dx < p.userData.w/2 + 0.4 && dz < p.userData.d/2 + 0.4) {
                    let top = p.position.y + p.userData.h/2;
                    if (py <= top + 1.8 && py > top - 0.5) {
                        if(!canFly) { py = top + 1.8; vy = 0; onGround = true; }
                        score = Math.max(score, p.userData.id);
                        document.getElementById('scoreBox').innerText = "Höhe: " + score;
                    }
                }
            });

            px = nextPx; pz = nextPz;
            if(py < -40) { px = 0; py = 2; pz = 5; vy = 0; } // Schneller Respawn

            camera.position.set(px, py, pz);
            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw; camera.rotation.x = pitch;

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
