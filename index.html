<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bacon Hair Adventure v3</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .btn { width: 70px; height: 70px; background: rgba(0,0,0,0.5); border-radius: 15px; border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 25px; pointer-events: auto; }
        @media (min-width: 800px) { .controls { display: none; } }
    </style>
</head>
<body>
    <div id="ui">
        <h2>BACON ADVENTURE</h2>
        <p>Steuerung: WASD, Pfeiltasten oder Buttons</p>
    </div>

    <div class="controls">
        <div style="display: flex; gap: 15px;">
            <div id="btnLeft" class="btn">◀</div>
            <div id="btnRight" class="btn">▶</div>
        </div>
        <div id="btnJump" class="btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x55ccff);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Schatten für mehr Tiefe
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 15, 10);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // --- ROBlox CHARAKTER BAUEN ---
        const player = new THREE.Group();
        player.castShadow = true;

        // Materialien
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac }); // Haut
        const torseMat = new THREE.MeshStandardMaterial({ color: 0x3333ee }); // Blaues Shirt
        const limbMat = new THREE.MeshStandardMaterial({ color: 0x333333 }); // Schwarze Hose/Arme
        const hairBaseMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f }); // Dunkles Haar
        const hairStreakMat = new THREE.MeshStandardMaterial({ color: 0xffd700 }); // Goldene Bacon-Strähne

        // Torso
        const torse = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), torseMat);
        torse.position.y = 0.6;
        torse.castShadow = true;
        player.add(torse);

        // Kopf
        const headGroup = new THREE.Group();
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
        headGroup.add(head);

        // Augen (Zwei kleine schwarze Punkte)
        const eyeGeo = new THREE.BoxGeometry(0.08, 0.08, 0.01);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.15, 0.05, 0.25);
        headGroup.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.15, 0.05, 0.25);
        headGroup.add(rightEye);

        // Bacon Hair (Dunkel mit Streifen)
        const hairBase = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.6), hairBaseMat);
        hairBase.position.y = 0.35;
        headGroup.add(hairBase);
        const hairStreak = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.25, 0.61), hairStreakMat);
        hairStreak.position.set(-0.2, 0.35, 0); // Die goldene Bacon-Strähne
        headGroup.add(hairStreak);

        headGroup.position.y = 1.45;
        headGroup.castShadow = true;
        player.add(headGroup);

        // Arme (Beweglich)
        const leftArmGroup = new THREE.Group();
        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.1, 0.3), limbMat);
        leftArm.position.y = -0.45; // Drehpunkt an die Schulter
