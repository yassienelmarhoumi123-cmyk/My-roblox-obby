<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Obby - Split Screen Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        .ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; display: flex; }
        .player-ui { flex: 1; padding: 15px; color: white; text-shadow: 2px 2px 4px #000; font-size: 14px; z-index: 10; }
        .controls-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .btn-group { display: flex; gap: 4px; pointer-events: auto; }
        .btn { width: 50px; height: 50px; background: rgba(0,0,0,0.6); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; -webkit-user-select: none; }
        #divider { position: absolute; left: 50%; width: 2px; height: 100%; background: white; z-index: 50; transform: translateX(-50%); }
    </style>
</head>
<body>
    <div id="divider"></div>
    <div class="ui-container">
        <div class="player-ui">P1: <span id="s1">0</span><br>W,A,S,D + Q,E</div>
        <div class="player-ui" style="text-align: right;">P2: <span id="s2">0</span><br>Pfeile + , .</div>
    </div>

    <div class="controls-container">
        <div class="btn-group">
            <div id="p1L" class="btn">A</div>
            <div id="p1F" class="btn" style="background:white;color:black">W</div>
            <div id="p1R" class="btn">D</div>
            <div id="p1J" class="btn" style="background:green">JMP</div>
        </div>
        <div class="btn-group">
            <div id="p2L" class="btn">←</div>
            <div id="p2F" class="btn" style="background:white;color:black">↑</div>
            <div id="p2R" class="btn">→</div>
            <div id="p2J" class="btn" style="background:green">JMP</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // INITIALISIERUNG
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.autoClear = false;
        document.body.appendChild(renderer.domElement);

        // LICHT
        const light = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(light);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 20, 10);
        scene.add(sun);

        // KAMERAS
        const cam1 = new THREE.PerspectiveCamera(75, (window.innerWidth/2)/window.innerHeight, 0.1, 1000);
        const cam2 = new THREE.PerspectiveCamera(75, (window.innerWidth/2)/window.innerHeight, 0.1, 1000);
        cam1.rotation.order = "YXZ";
        cam2.rotation.order = "YXZ";

                this.id = id; this.x = x; this.y = 5; this.z = 12;
                this.vy = 0; this.yaw = 0; this.score = 0;
                this.keys = {}; this.lastX = 0;
            }
        }
        const p1 = new Player(1, -3);
        const p2 = new Player(2, 3);
