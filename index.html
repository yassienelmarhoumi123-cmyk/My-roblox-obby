<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Obby - Fly Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; pointer-events: none; }
        .btn { width: 75px; height: 75px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; pointer-events: auto; font-weight: bold; }
        
        #pinPad { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 20px; border: 4px solid #00ff88; border-radius: 15px;
            display: none; flex-direction: column; align-items: center; z-index: 1000; pointer-events: auto;
        }
        #pinPad input { font-size: 24px; width: 120px; text-align: center; margin-bottom: 10px; }
        #pinPad button { padding: 10px 20px; background: #00ff88; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreBox">Höhe: 0</div>
        <div id="flyStatus" style="color: #00ff88; display:none;">FLUGMODUS AKTIV 🚀</div>
    </div>

    <div id="pinPad">
        <h3 style="color:white; margin:0 0 10px 0;">MASCHINE (CODE: 1234)</h3>
        <input type="number" id="pinInput" placeholder="PIN">
        <div style="display:flex;">
            <button onclick="checkPin()">OK</button>
            <button onclick="closePin()" style="background:red;">X</button>
        </div>
    </div>

    <div class="controls">
        <div id="btnLeft" class="btn">LINKS</div>
        <div id="btnForward" class="btn">VOR</div>
        <div id="btnRight" class="btn">RECHTS</div>
        <div id="btnJump" class="btn">FLIEGEN</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        let px = 0, py = 5, pz = 10, vy = 0; 
        let moveX = 0, moveZ = 0, yaw = 0, pitch = 0, onGround = false;
        let score = 0, canFly = false;
        const platforms = [];

        // Maschine (Schwarzer Block auf der Startinsel)
        const machine = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 3), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        machine.position.set(6, 2, 0);
        scene.add(machine);

        function addBlock(id) {
            let w = 8, d = 8, h = 1.2;
            const colors = [0xff0000, 0xff7f00, 0xffff00, 0x00ff00, 0x0000ff, 0x4b0082, 0x9400d3];
            let color = id === 0 ? 0xcccccc : colors[id % colors.length];
            if (id === 0) { w = 30; d = 30; }
            
            const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color }));
            let x = 0, y = 0, z = 0;
            if (id > 0) {
                let a = id * 0.45;
                x = Math.sin(a) * 15; z = id * -12; y = id * 2.5;
            }
            b.position.set(x, y, z);
            b.userData = { w, d, h, id };
            scene.add(b);
            platforms.push(b);
        }
        for(let i=0; i<60; i++) addBlock(i);

        // PIN FUNKTIONEN
        function checkPin() {
            if(document.getElementById('pinInput').value === "1234") {
                canFly = true;
                document.getElementById('flyStatus').style.display = "block";
                document.getElementById('btnJump').innerText = "HOCH";
                closePin();
            } else { alert("Falsch!"); }
        }
        function closePin() { document.getElementById('pinPad').style.display = "none"; }
